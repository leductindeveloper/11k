<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Portal | Thông Báo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', olive: '#98a84c', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-bg font-sans text-gray-800 antialiased">
        <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Tài liệu</a>
                    <a href="honors.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng vàng</a>
                    <a href="recap.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Sự kiện</a>
                    <a href="memories.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Kỷ niệm</a>
                    <a href="members.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex items-center gap-3 mb-8">
            <a href="index.html" class="w-10 h-10 bg-white rounded-full flex justify-center items-center shadow-sm text-gray-400 hover:text-primary hover:shadow-md transition-all"><i class="fas fa-arrow-left"></i></a>
            <div>
                <h1 class="text-3xl font-black text-dark tracking-tight">Trung Tâm Thông Báo</h1>
                <p class="text-sm text-gray-500 font-medium mt-1">Các quyết định và lịch trình quan trọng từ BCS Lớp</p>
            </div>
        </div>

        <div class="admin-only hidden glass-card rounded-3xl p-6 mb-8 shadow-sm border-l-4 border-red-500">
            <h3 class="font-bold text-lg mb-4 text-red-500 uppercase tracking-widest text-xs"><i class="fas fa-bullhorn"></i> Soạn Thông báo khẩn</h3>
            <input type="text" id="a-title" placeholder="Tiêu đề thông báo..." class="w-full bg-white border border-gray-100 text-gray-800 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-red-500/50 font-bold mb-3 shadow-inner">
            <textarea id="a-content" placeholder="Nội dung chi tiết..." class="w-full bg-white border border-gray-100 text-gray-800 rounded-2xl px-4 py-3 focus:ring-2 focus:ring-red-500/50 font-medium resize-none mb-3 shadow-inner" rows="4"></textarea>
            <button onclick="uploadAnn()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-2xl font-bold font-lg shadow-md w-full sm:w-auto transition-colors"><i class="fas fa-paper-plane"></i> Phát đi</button>
        </div>

        <div id="container" class="space-y-6"></div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('container');
            container.innerHTML = getSkeletonHTML();
            setTimeout(loadAnns, 400);
        });

        async function uploadAnn() {
            const t = document.getElementById('a-title').value;
            const c = document.getElementById('a-content').value;
            if(!t || !c) return showToast("Nhập thiếu!", "error");
            
            await apiPost('announcements', { title: t, content: c, author: currentUser.name });
            showToast("Thông báo đã được phát!");
            document.getElementById('a-title').value = '';
            document.getElementById('a-content').value = '';
            loadAnns();
        }

        async function loadAnns() {
            const anns = await apiGet('announcements');
            const c = document.getElementById('container');
            if(anns.length === 0) return c.innerHTML = '<div class="glass-card text-center p-10 rounded-3xl"><p class="text-gray-500 font-bold">Chưa có thông báo nào.</p></div>';
            
            c.innerHTML = anns.map(a => `
                <div class="glass-card rounded-3xl p-6 shadow-sm border-l-4 border-primary hover:shadow-lg transition-shadow relative overflow-hidden group bg-white">
                    ${currentUser && currentUser.role === 'Admin' ? `<button onclick="deleteAnn('${a.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 transition-colors bg-red-50 w-8 h-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100"><i class="fas fa-trash"></i></button>` : ''}
                    <h3 class="text-2xl font-black text-dark mb-2 pr-8">${a.title}</h3>
                    <div class="flex items-center gap-2 mb-4">
                        <span class="bg-red-100 text-red-600 text-[10px] uppercase font-black px-2 py-0.5 rounded tracking-widest"><i class="fas fa-exclamation-circle mr-1"></i> Quan trọng</span>
                        <p class="text-[12px] font-bold text-gray-400"><i class="fas fa-clock mr-1"></i> ${timeAgo(a.createdAt)} • Bởi: ${a.author}</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <p class="text-gray-700 leading-relaxed font-medium whitespace-pre-wrap">${a.content}</p>
                    </div>
                </div>
            `).join('');
        }

        async function deleteAnn(id) {
            if (confirm("Xóa thông báo?")) {
                await fetch(`/api/announcements/${id}`, { method: 'DELETE' });
                showToast("Đã xóa", "success");
                loadAnns();
            }
        }
    </script>
</body>
</html>
