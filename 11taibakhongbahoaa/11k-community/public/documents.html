<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Portal | Tài Liệu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', olive: '#98a84c', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-bg font-sans text-gray-800 antialiased">

    <!-- Premium Navbar -->
        <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html" class="text-primary font-bold text-sm relative after:absolute after:bottom-[-20px] after:left-0 after:w-full after:h-0.5 after:bg-primary">Tài liệu</a>
                    <a href="honors.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng vàng</a>
                    <a href="recap.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Sự kiện</a>
                    <a href="memories.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Kỷ niệm</a>
                    <a href="members.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="mb-10 text-center">
            <div class="inline-block px-4 py-1.5 bg-blue-50 text-blue-600 rounded-full text-xs font-black uppercase tracking-widest mb-3 border border-blue-100 shadow-sm"><i class="fas fa-book-open"></i> Thư Viện 11K</div>
            <h1 class="text-3xl font-black text-dark mb-2">Tài liệu Ôn Tập</h1>
            <p class="text-gray-500 font-medium text-sm">Nơi lưu trữ bài giảng, đề thi và sách bài tập nội bộ.</p>
        </div>

        <div class="admin-only hidden mb-12 p-8 glass-card rounded-3xl shadow-lg border-t-4 border-blue-400 bg-white">
            <h3 class="font-black text-2xl mb-8 text-dark tracking-tight"><i class="fas fa-file-upload text-blue-500 mr-2"></i> Upload Tài Liệu Mới</h3>
            
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left Column: File Upload & Preview -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <label id="d-drop-zone" for="d-file" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-blue-400/50 rounded-3xl cursor-pointer bg-blue-50/50 hover:bg-blue-50 transition-colors group relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center z-10">
                            <i class="fas fa-cloud-upload-alt text-4xl text-blue-500/50 group-hover:text-blue-500 transition-colors mb-3"></i>
                            <p class="mb-1 text-sm text-gray-700 font-bold"><span class="text-blue-600 font-black">Nhấn để chọn</span> hoặc kéo thả file</p>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Hỗ trợ PDF, Word, Excel, ZIP...</p>
                        </div>
                        <input id="d-file" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.zip,.rar,image/*" />
                    </label>
                    <div id="d-previews" class="grid grid-cols-4 sm:grid-cols-5 gap-3 hidden"></div>
                </div>

                <!-- Right Column: Content Input -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4 justify-between">
                    <div class="flex flex-col gap-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tên tài liệu (*)</label>
                                <input type="text" id="d-title" placeholder="Tên tài liệu..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 font-bold shadow-inner transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Môn học (*)</label>
                                <input type="text" id="d-sub" placeholder="Toán, Lý, Hóa..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 font-bold shadow-inner transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Link Drive dự phòng (Nếu file quá nặng)</label>
                            <input type="text" id="d-url" placeholder="https://drive.google.com/..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400 font-medium shadow-inner transition-all">
                        </div>
                    </div>
                    <button onclick="uploadDoc()" class="bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white w-full py-4 rounded-2xl font-black shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 text-sm uppercase tracking-widest transition-all hover:-translate-y-1 mt-2">
                        <i class="fas fa-plus"></i> Đưa Lên Thư Viện
                    </button>
                </div>
            </div>
        </div>

        <div id="docs-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
    </main>

    <script src="js/app.js"></script>
    <script>
        let selectedDocFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('docs-container');
            container.innerHTML = getSkeletonHTML();
            setTimeout(loadDocs, 500);

            const dFileInput = document.getElementById('d-file');
            if (dFileInput) {
                dFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        Array.from(e.target.files).forEach(f => selectedDocFiles.push(f));
                        renderDocPreviews();
                    }
                    e.target.value = '';
                });
            }
        });

        function renderDocPreviews() {
            const previewContainer = document.getElementById('d-previews');
            if (selectedDocFiles.length === 0) {
                previewContainer.innerHTML = '';
                previewContainer.classList.add('hidden');
                return;
            }
            
            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');
            
            selectedDocFiles.forEach((file, index) => {
                const div = document.createElement('div');
                div.className = 'aspect-square rounded-2xl overflow-hidden shadow-sm border border-blue-100 bg-blue-50/50 hover:bg-red-50 relative group animate-fade-in cursor-pointer flex flex-col items-center justify-center p-2 transition-colors';
                div.onclick = () => {
                    selectedDocFiles.splice(index, 1);
                    renderDocPreviews();
                };
                
                let icon = 'fa-file-alt text-gray-500';
                if(file.type.includes('pdf')) icon = 'fa-file-pdf text-red-500';
                else if(file.type.includes('word') || file.name.endsWith('.doc') || file.name.endsWith('.docx')) icon = 'fa-file-word text-blue-600';
                else if(file.type.includes('excel') || file.name.endsWith('.xls') || file.name.endsWith('.xlsx')) icon = 'fa-file-excel text-green-600';
                else if(file.type.includes('image')) icon = 'fa-file-image text-primary';
                else if(file.name.endsWith('.zip') || file.name.endsWith('.rar')) icon = 'fa-file-archive text-yellow-600';

                div.innerHTML = `
                    <i class="fas ${icon} text-3xl mb-1 group-hover:scale-110 transition-transform duration-300"></i>
                    <p class="text-[9px] font-bold text-gray-500 text-center w-full truncate px-1">${file.name}</p>
                    <div class="absolute inset-0 bg-red-500/90 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity rounded-2xl">
                        <i class="fas fa-trash-alt text-white text-xl shadow-sm"></i>
                    </div>
                `;
                previewContainer.appendChild(div);
            });
        }

        async function uploadDoc() {
            const t = document.getElementById('d-title').value;
            const s = document.getElementById('d-sub').value;
            const u = document.getElementById('d-url').value;
            
            if(!t || !s) return showToast("Nhập tên và môn học!", "error");
            if(!u && selectedDocFiles.length === 0) return showToast("Vui lòng tải file lên hoặc nhập link GDrive!", "error");

            const btn = document.querySelector('button[onclick="uploadDoc()"]');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang tải lên...';
            btn.disabled = true;

            let mediaUrls = [];
            if(selectedDocFiles.length > 0) {
                const form = new FormData();
                for (let i = 0; i < selectedDocFiles.length; i++) {
                    form.append('media', selectedDocFiles[i]);
                }
                const r = await fetch('/api/upload-multiple', { method: 'POST', body: form });
                const dat = await r.json();
                mediaUrls = dat.urls || [];
            }

            let finalUrl = u;
            if(!finalUrl && mediaUrls.length > 0) finalUrl = mediaUrls[0]; // fallback so older code doesn't crash

            await apiPost('documents', { title: t, subject: s, fileUrl: finalUrl, mediaUrls, description: "Tài liệu cập nhật mới." });
            
            showToast("Thêm tài liệu thành công");
            document.getElementById('d-title').value = '';
            document.getElementById('d-sub').value = '';
            document.getElementById('d-url').value = '';
            selectedDocFiles = [];
            renderDocPreviews();
            
            btn.innerHTML = '<i class="fas fa-plus"></i> Đưa Lên Thư Viện';
            btn.disabled = false;
            
            loadDocs();
        }

        async function loadDocs() {
            const docs = await apiGet('documents');
            const container = document.getElementById('docs-container');
            if(docs.length === 0) return container.innerHTML = '<p class="col-span-2 text-center text-gray-400 font-bold py-10">Thư viện trống.</p>';
            container.innerHTML = docs.map(d => `
                <div class="glass-card p-6 rounded-3xl shadow-sm hover:shadow-lg transition-transform hover:-translate-y-1 duration-300 relative bg-white border border-transparent hover:border-blue-100 flex flex-col h-full">
                    ${currentUser && currentUser.role === 'Admin' ? `<button onclick="deleteDoc('${d.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 focus:outline-none bg-red-50 w-8 h-8 rounded-full flex justify-center items-center transition-colors shadow-sm"><i class="fas fa-trash"></i></button>` : ''}
                    <div class="flex items-start gap-4 mb-4 flex-1">
                        <div class="w-14 h-14 bg-gradient-to-br from-blue-50 to-indigo-50 text-blue-500 rounded-2xl flex justify-center items-center text-2xl shadow-inner border border-blue-100 font-black flex-shrink-0"><i class="fas fa-file-alt"></i></div>
                        <div class="w-full">
                            <span class="text-[10px] font-black uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-0.5 rounded border border-blue-100 mb-1 inline-block">${d.subject}</span>
                            <h3 class="font-bold text-dark text-lg leading-tight w-full pr-6">${d.title}</h3>
                        </div>
                    </div>
                    
                    ${d.mediaUrls && d.mediaUrls.length > 0 ? `
                        <div class="flex flex-col gap-2 mt-auto w-full border-t border-gray-100 pt-4">
                            ${d.mediaUrls.map((url, idx) => {
                                let label = "Tải File " + (idx + 1);
                                if(url.endsWith('.pdf')) label += " (PDF)";
                                else if(url.endsWith('.doc') || url.endsWith('.docx')) label += " (Word)";
                                else if(url.endsWith('.xls') || url.endsWith('.xlsx')) label += " (Excel)";
                                else if(url.endsWith('.zip') || url.endsWith('.rar')) label += " (ZIP)";
                                return '<a href="' + url + '" target="_blank" download class="block w-full text-center py-2.5 bg-blue-50 border border-blue-100 text-blue-600 font-bold rounded-xl text-xs hover:bg-blue-600 hover:text-white transition-colors truncate px-4 shadow-sm"><i class="fas fa-download mr-1"></i> ' + label + '</a>';
                            }).join('')}
                            ${d.fileUrl && !d.mediaUrls.includes(d.fileUrl) ? '<a href="' + d.fileUrl + '" target="_blank" class="block w-full text-center py-2.5 bg-gray-50 border border-gray-200 text-gray-600 font-bold rounded-xl text-xs hover:bg-gray-800 hover:text-white transition-colors truncate px-4 shadow-sm"><i class="fas fa-external-link-alt mr-1"></i> Mở Link Gốc</a>' : ''}
                        </div>
                    ` : `
                        <a href="${d.fileUrl}" target="_blank" class="block w-full text-center py-3 mt-auto bg-blue-50 border border-blue-100 text-blue-600 font-bold rounded-xl text-sm hover:bg-blue-600 hover:text-white transition-colors truncate px-4 shadow-sm"><i class="fas fa-external-link-alt mr-1"></i> Truy Cập Tài Liệu</a>
                    `}
                </div>
            `).join('');
        }


        async function deleteDoc(id) {
            if(confirm("Xóa tài liệu?")) {
                await fetch(`/api/documents/${id}`, { method: 'DELETE' });
                showToast("Xóa thành công", "success");
                loadDocs();
            }
        }
    </script>
</body>
</html>
