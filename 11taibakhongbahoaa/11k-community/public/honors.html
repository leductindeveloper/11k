<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Portal | Bảng Vàng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', olive: '#98a84c', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-bg font-sans text-gray-800 antialiased">
    <!-- Premium Navbar -->
        <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Tài liệu</a>
                    <a href="honors.html" class="text-primary font-bold text-sm relative after:absolute after:bottom-[-20px] after:left-0 after:w-full after:h-0.5 after:bg-primary">Bảng vàng</a>
                    <a href="recap.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Sự kiện</a>
                    <a href="memories.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Kỷ niệm</a>
                    <a href="members.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="text-center mb-10">
            <div class="inline-block px-4 py-1.5 bg-yellow-50 text-yellow-600 rounded-full text-xs font-black uppercase tracking-widest mb-3 border border-yellow-100 shadow-sm"><i class="fas fa-medal"></i> Vinh Danh Đại Khách</div>
            <h1 class="text-4xl font-black text-dark tracking-tight mb-2">Bảng Vàng Thành Tích</h1>
            <p class="text-gray-500 font-medium">Niềm tự hào của 11K</p>
        </div>

        <div class="admin-only hidden mb-12 p-8 glass-card rounded-3xl shadow-lg border-t-4 border-yellow-400 bg-white">
            <h3 class="font-black text-2xl mb-8 text-dark tracking-tight"><i class="fas fa-trophy text-yellow-500 mr-2"></i> Vinh Danh Tân Bảng Vàng</h3>
            
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left Column: Image Upload -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <label id="h-drop-zone" for="h-file" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-yellow-400/50 rounded-3xl cursor-pointer bg-yellow-50/50 hover:bg-yellow-50 transition-colors group relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center z-10">
                            <i class="fas fa-cloud-upload-alt text-4xl text-yellow-500/50 group-hover:text-yellow-500 transition-colors mb-3"></i>
                            <p class="mb-1 text-sm text-gray-700 font-bold"><span class="text-yellow-600 font-black">Nhấn để chọn</span> hoặc kéo thả ảnh</p>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Sẽ lưu dồn ảnh</p>
                        </div>
                        <input id="h-file" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50" multiple accept="image/*" />
                    </label>
                    <div id="h-previews" class="grid grid-cols-3 sm:grid-cols-4 gap-3 hidden"></div>
                </div>

                <!-- Right Column: Content Input -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4 justify-between">
                    <div class="flex flex-col gap-4">
                        <div>
                            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tên học sinh</label>
                            <input type="text" id="h-name" placeholder="Tên người được vinh danh..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 font-bold shadow-inner transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Thành tích cụ thể</label>
                            <input type="text" id="h-achieve" placeholder="Giải thưởng, Danh hiệu..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-yellow-400 font-bold shadow-inner transition-all">
                        </div>
                    </div>
                    <button onclick="addHonor()" class="bg-gradient-to-r from-yellow-400 to-yellow-600 hover:from-yellow-500 hover:to-yellow-700 text-white w-full py-4 rounded-2xl font-black shadow-lg shadow-yellow-500/30 flex items-center justify-center gap-2 text-sm uppercase tracking-widest transition-all hover:-translate-y-1">
                        <i class="fas fa-crown"></i> Ghi Danh Bảng Vàng
                    </button>
                </div>
            </div>
        </div>

        <div id="honors-container" class="grid grid-cols-1 sm:grid-cols-2 gap-6"></div>
    </main>

    <script src="js/app.js"></script>
    <script>
        let selectedHonorFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadHonors, 400);

            const hFileInput = document.getElementById('h-file');
            if (hFileInput) {
                hFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        Array.from(e.target.files).forEach(f => selectedHonorFiles.push(f));
                        renderHonorPreviews();
                    }
                    e.target.value = '';
                });
            }
        });

        function renderHonorPreviews() {
            const previewContainer = document.getElementById('h-previews');
            if (selectedHonorFiles.length === 0) {
                previewContainer.innerHTML = '';
                previewContainer.classList.add('hidden');
                return;
            }
            
            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');
            
            selectedHonorFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'aspect-square rounded-2xl overflow-hidden shadow-sm border border-gray-100 bg-white relative group animate-fade-in cursor-pointer';
                    div.onclick = () => {
                        selectedHonorFiles.splice(index, 1);
                        renderHonorPreviews();
                    };
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">
                        <div class="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-trash-alt text-white text-xl shadow-sm"></i>
                        </div>
                    `;
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        async function addHonor() {
            const n = document.getElementById('h-name').value;
            const a = document.getElementById('h-achieve').value;
            if(!n || !a || selectedHonorFiles.length === 0) return showToast("Nhập đủ thông tin và chọn ảnh admin nhé", "error");

            showToast("Đang tải dữ liệu...");
            const form = new FormData();
            for (let i = 0; i < selectedHonorFiles.length; i++) {
                form.append('media', selectedHonorFiles[i]);
            }
            const r = await fetch('/api/upload-multiple', { method: 'POST', body: form });
            const dat = await r.json();
            const avatar = dat.urls && dat.urls.length > 0 ? dat.urls[0] : null;

            await apiPost('honors', { name: n, achievement: a, month: 'Kỳ mới', avatar, mediaUrls: dat.urls });
            showToast("Vinh danh thành công");
            
            document.getElementById('h-name').value = '';
            document.getElementById('h-achieve').value = '';
            selectedHonorFiles = [];
            renderHonorPreviews();
            
            loadHonors();
        }

        async function loadHonors() {
            const h = await apiGet('honors');
            const c = document.getElementById('honors-container');
            if(h.length === 0) return c.innerHTML = '<p class="text-center text-gray-400 col-span-2 py-10">Chưa có ai xuất hiện trên bảng này.</p>';

            c.innerHTML = h.map(item => `
                <div class="glass-card rounded-3xl p-6 relative flex flex-col items-center hover:-translate-y-2 transition-transform duration-300">
                    ${currentUser && currentUser.role === 'Admin' ? `<button onclick="deleteHonor('${item.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 w-8 h-8 flex items-center justify-center bg-red-50 rounded-full transition-colors z-20"><i class="fas fa-times"></i></button>` : ''}
                    <div class="absolute -top-5 w-10 h-10 bg-yellow-400 rounded-full flex justify-center items-center text-white text-xl shadow-lg border-2 border-white"><i class="fas fa-crown"></i></div>
                    <img src="${item.mediaUrls && item.mediaUrls.length > 0 ? item.mediaUrls[0] : item.avatar}" class="w-24 h-24 rounded-full object-cover mb-4 mt-2 border-4 border-orange-50 shadow-md">
                    <h3 class="text-xl font-black text-dark">${item.name}</h3>
                    <p class="text-xs font-bold text-primary uppercase mt-1 tracking-widest">${item.month}</p>
                    <div class="bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 mt-4 w-full text-center">
                        <p class="text-sm font-bold text-gray-600 leading-snug">"${item.achievement}"</p>
                    </div>
                    ${item.mediaUrls && item.mediaUrls.length > 1 ? `
                        <div class="grid grid-cols-${Math.min(3, item.mediaUrls.length - 1)} gap-2 mt-4 w-full">
                            ${item.mediaUrls.slice(1).map(url => `
                                <img src="${url}" class="w-full h-20 object-cover rounded-xl shadow-sm border border-gray-100 transform hover:scale-105 transition-transform">
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        async function deleteHonor(id) {
            if(confirm("Xoa?")) {
                await fetch(`/api/honors/${id}`, { method: 'DELETE' });
                showToast("Đã xóa");
                loadHonors();
            }
        }
    </script>
</body>
</html>
