<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị | Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-dark font-sans text-gray-800 antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Secret login modal -->
    <div class="glass-card w-full max-w-sm rounded-[2rem] p-8 relative overflow-hidden shadow-2xl border border-white/10 bg-white/5 backdrop-blur-2xl">
        <div class="absolute -top-20 -right-20 w-48 h-48 bg-primary opacity-30 blur-3xl rounded-full"></div>
        
        <div class="text-center mb-8 relative z-10">
            <div class="w-16 h-16 bg-gradient-to-tr from-primary to-orange-400 text-white rounded-2xl flex items-center justify-center font-black text-3xl shadow-[0_0_30px_rgba(255,108,0,0.5)] mb-6 mx-auto">
                <i class="fas fa-shield-alt text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-white tracking-tight">Khu Vực Quản Trị</h1>
            <p class="text-[11px] font-bold uppercase tracking-widest text-primary mt-2">Dành riêng cho Admin 11K</p>
        </div>

        <form id="login-form" class="space-y-4 relative z-10">
            <div id="error-msg" class="hidden text-xs text-red-500 font-bold bg-red-500/10 p-3 rounded-xl border border-red-500/20 text-center mb-4"></div>
            
            <div>
                <div class="relative flex items-center">
                    <i class="fas fa-user absolute left-4 text-gray-400"></i>
                    <input type="text" id="username" class="w-full bg-white/10 border border-white/10 text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold placeholder-gray-400" placeholder="Tên đăng nhập" required>
                </div>
            </div>
            
            <div>
                <div class="relative flex items-center">
                    <i class="fas fa-lock absolute left-4 text-gray-400"></i>
                    <input type="password" id="password" class="w-full bg-white/10 border border-white/10 text-white rounded-xl pl-10 pr-4 py-3.5 focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold placeholder-gray-400" placeholder="Mật khẩu bảo mật" required>
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary py-3.5 rounded-xl font-bold font-lg shadow-[0_10px_20px_rgba(255,108,0,0.2)] mt-6 flex justify-center items-center gap-2 hover:scale-[1.02] transition-transform text-white border border-orange-400/50">
                Xác thực truy cập
            </button>

            <a href="index.html" class="block text-center text-[10px] uppercase font-bold text-gray-400 hover:text-white mt-6 transition-colors"><i class="fas fa-arrow-left mr-1"></i> Quay lại Cổng Thông Tin</a>
        </form>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            
            const err = document.getElementById('error-msg');
            err.classList.add('hidden');

            try {
                const res = await apiPost('auth/login', { username: u, password: p });
                if(res.success) {
                    localStorage.setItem('user', JSON.stringify(res.user));
                    window.location.href = 'index.html';
                } else {
                    err.innerHTML = '<i class="fas fa-ban mr-1"></i> Truy cập bị từ chối';
                    err.classList.remove('hidden');
                }
            } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
