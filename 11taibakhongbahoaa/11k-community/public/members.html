<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Portal | Thành Viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', olive: '#98a84c', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-bg font-sans text-gray-800 antialiased">
        <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Tài liệu</a>
                    <a href="honors.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng vàng</a>
                    <a href="recap.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Sự kiện</a>
                    <a href="memories.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Kỷ niệm</a>
                    <a href="members.html" class="text-primary font-bold text-sm relative after:absolute after:bottom-[-20px] after:left-0 after:w-full after:h-0.5 after:bg-primary">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="text-center mb-12">
            <div class="inline-block px-3 py-1 bg-olive/10 text-olive rounded-full text-xs font-black uppercase tracking-widest mb-3 border border-olive/20 shadow-sm"><i class="fas fa-users"></i> Hồ Sơ Nội Bộ</div>
            <h1 class="text-4xl font-black text-dark tracking-tight mb-3">Danh Sách 11K</h1>
            <p class="text-lg text-gray-500 font-medium">Cơ sở dữ liệu học sinh chính thức</p>
        </div>

        <div class="admin-only hidden mb-12 p-8 glass-card rounded-3xl shadow-lg border-t-4 border-olive bg-white">
            <h3 class="font-black text-2xl mb-8 text-dark tracking-tight"><i class="fas fa-user-plus text-olive mr-2"></i> Nhập Liệu Hồ Sơ Học Sinh</h3>
            
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left Column: Image Upload -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <label id="m-drop-zone" for="m-file" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-olive/40 rounded-3xl cursor-pointer bg-emerald-50/50 hover:bg-emerald-50 transition-colors group relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center z-10">
                            <i class="fas fa-cloud-upload-alt text-4xl text-olive/50 group-hover:text-olive transition-colors mb-3"></i>
                            <p class="mb-1 text-sm text-gray-700 font-bold"><span class="text-olive font-black">Nhấn để chọn</span> hoặc kéo thả ảnh</p>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Ảnh đầu tiên làm Avatar</p>
                        </div>
                        <input id="m-file" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50" multiple accept="image/*" />
                    </label>
                    <div id="m-previews" class="grid grid-cols-3 sm:grid-cols-4 gap-3 hidden"></div>
                </div>

                <!-- Right Column: Content Input -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4 justify-between">
                    <div class="flex flex-col gap-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Họ và tên</label>
                                <input type="text" id="m-name" placeholder="Họ và tên..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-olive/50 font-bold shadow-inner transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Chức vụ</label>
                                <input type="text" id="m-role" placeholder="Chức vụ..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-olive/50 font-bold shadow-inner transition-all">
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Định hướng / Ước mơ</label>
                            <textarea id="m-quote" placeholder="Định hướng tương lai..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-olive/50 font-medium shadow-inner transition-all resize-none min-h-[90px]"></textarea>
                        </div>
                    </div>
                    <button onclick="uploadMember()" class="bg-gradient-to-r from-olive to-emerald-600 hover:from-olive/90 hover:to-emerald-700 text-white w-full py-4 rounded-2xl font-black shadow-lg shadow-olive/30 flex items-center justify-center gap-2 text-sm uppercase tracking-widest transition-all hover:-translate-y-1 mt-2">
                        <i class="fas fa-database"></i> Thêm vào hệ thống
                    </button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="members-container"></div>
    </main>

    <script src="js/app.js"></script>
    <script>
        let selectedMemberFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(loadMembers, 400);

            const mFileInput = document.getElementById('m-file');
            if (mFileInput) {
                mFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        Array.from(e.target.files).forEach(f => selectedMemberFiles.push(f));
                        renderMemberPreviews();
                    }
                    e.target.value = '';
                });
            }
        });

        function renderMemberPreviews() {
            const previewContainer = document.getElementById('m-previews');
            if (selectedMemberFiles.length === 0) {
                previewContainer.innerHTML = '';
                previewContainer.classList.add('hidden');
                return;
            }
            
            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');
            
            selectedMemberFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'aspect-square rounded-2xl overflow-hidden shadow-sm border border-gray-100 bg-white relative group animate-fade-in cursor-pointer';
                    div.onclick = () => {
                        selectedMemberFiles.splice(index, 1);
                        renderMemberPreviews();
                    };
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">
                        <div class="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-trash-alt text-white text-xl shadow-sm"></i>
                        </div>
                    `;
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadMember() {
            const name = document.getElementById('m-name').value;
            const role = document.getElementById('m-role').value;
            const quote = document.getElementById('m-quote').value;
            if (!name || !role || selectedMemberFiles.length === 0) return showToast("Điền đủ thông tin và chọn ảnh!", "error");

            showToast("Đang tải dữ liệu lên...");
            
            const form = new FormData();
            for (let i = 0; i < selectedMemberFiles.length; i++) {
                form.append('media', selectedMemberFiles[i]);
            }
            const r = await fetch('/api/upload-multiple', { method: 'POST', body: form });
            const dat = await r.json();
            const avatar = dat.urls && dat.urls.length > 0 ? dat.urls[0] : null;

            await apiPost('members', { name, role, quote, avatar, mediaUrls: dat.urls });
            showToast("Đã lưu hồ sơ mới!");

            document.getElementById('m-name').value = '';
            document.getElementById('m-role').value = '';
            document.getElementById('m-quote').value = '';
            selectedMemberFiles = [];
            renderMemberPreviews();

            loadMembers();
        }

        async function loadMembers() {
            const mems = await apiGet('members');
            const c = document.getElementById('members-container');
            if(mems.length === 0) return c.innerHTML = '<div class="col-span-full text-center text-gray-500 font-bold glass-card rounded-3xl p-10">Database đang trống.</div>';

            c.innerHTML = mems.map(m => `
                <div class="glass-card rounded-3xl p-6 flex flex-col items-center text-center shadow-lg hover:shadow-2xl transition-all transform hover:-translate-y-2 relative group border-2 border-transparent hover:border-olive/30 bg-white">
                    ${currentUser && currentUser.role === 'Admin' ? `<button onclick="deleteMember('${m.id}')" class="absolute top-4 right-4 text-gray-300 hover:text-red-500 bg-red-50 w-8 h-8 rounded-full flex items-center justify-center transition-colors opacity-0 group-hover:opacity-100"><i class="fas fa-trash"></i></button>` : ''}
                    <div class="relative w-28 h-28 mb-4">
                        <img src="${m.avatar}" class="w-28 h-28 rounded-full object-cover border-4 border-olive/10 shadow-md">
                        <div class="absolute -bottom-2 w-full flex justify-center text-center"><span class="bg-gradient-to-r from-dark to-slate-800 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg border border-white whitespace-nowrap">${m.role}</span></div>
                    </div>
                    <h3 class="text-xl font-bold text-dark w-full truncate mb-3 mt-1">${m.name}</h3>
                    <div class="bg-gray-50 p-3 rounded-2xl w-full flex-1 flex items-center justify-center">
                        <p class="text-xs text-gray-500 font-bold italic line-clamp-3">"${m.quote || 'Cố gắng học tập tốt.'}"</p>
                    </div>
                </div>
            `).join('');
        }

        async function deleteMember(id) {
            if (confirm("Xóa hồ sơ học sinh?")) {
                await fetch(`/api/members/${id}`, { method: 'DELETE' });
                showToast("Đã xóa hồ sơ", "success");
                loadMembers();
            }
        }
    </script>
</body>
</html>
