<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Community | Kỷ Niệm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#ff6c00', secondary: '#ed8720', accent: '#bf4e14', dark: '#35575a', olive: '#98a84c', bg: '#fdf8f5' },
                    fontFamily: { sans: ['Nunito', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .timeline-container {
            position: relative;
            padding-left: 3rem;
        }

        .timeline-line {
            position: absolute;
            left: 14px;
            top: 10px;
            bottom: 0;
            width: 4px;
            background: linear-gradient(to bottom, #ff6c00, #ed8720);
            border-radius: 2px;
        }

        .timeline-dot {
            position: absolute;
            left: -38px;
            top: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border: 4px solid #ff6c00;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(255, 108, 0, 0.2);
        }
    </style>
</head>

<body class="bg-bg font-sans text-gray-800 antialiased">
    <!-- Navbar -->
    <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông
                            Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản
                            lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html"
                        class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html"
                        class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Tài liệu</a>
                    <a href="honors.html"
                        class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng vàng</a>
                    <a href="recap.html"
                        class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Sự kiện</a>
                    <a href="memories.html"
                        class="text-primary font-bold text-sm relative after:absolute after:bottom-[-20px] after:left-0 after:w-full after:h-0.5 after:bg-primary">Kỷ
                        niệm</a>
                    <a href="members.html"
                        class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black text-dark tracking-tight mb-3">Hành Trình Thanh Xuân</h1>
            <p class="text-lg text-gray-500 font-medium">Bức tranh kỷ yếu điện tử của một thời hoa mộng 11K</p>
        </div>

        <div id="admin-add-memory"
            class="hidden mb-12 p-8 glass-card rounded-3xl shadow-lg border-t-4 border-primary bg-white">
            <h3 class="font-black text-2xl mb-8 text-dark tracking-tight"><i
                    class="fas fa-camera-retro text-primary mr-2"></i> Lưu Kỷ Niệm Mới Vào Dòng Thời Gian</h3>

            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left Column: Image Upload & Preview -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <label id="mem-drop-zone" for="mem-file"
                        class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-primary/40 rounded-3xl cursor-pointer bg-orange-50/50 hover:bg-orange-50 transition-colors group relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center z-10">
                            <i
                                class="fas fa-cloud-upload-alt text-4xl text-primary/50 group-hover:text-primary transition-colors mb-3"></i>
                            <p class="mb-1 text-sm text-gray-700 font-bold"><span class="text-primary font-black">Nhấn
                                    để chọn</span> hoặc kéo thả từng ảnh</p>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Sẽ lưu dồn nhiều
                                ảnh</p>
                        </div>
                        <input id="mem-file" type="file"
                            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50" multiple
                            accept="image/*" />
                    </label>
                    <div id="mem-previews" class="grid grid-cols-3 sm:grid-cols-4 gap-3 hidden"></div>
                </div>

                <!-- Right Column: Content Input -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label
                                class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Năm</label>
                            <select id="mem-year"
                                class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold shadow-inner transition-all appearance-none cursor-pointer">
                                <option value="2025">Năm 2024 - Ngày đầu bỡ ngỡ</option>
                                <option value="2026">Năm 2025 - Lớp 11 vững bước</option>
                                <option value="2027">Năm 2026 - Chào lớp 12</option>
                            </select>
                        </div>
                        <div>
                            <label
                                class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tiêu
                                đề</label>
                            <input type="text" id="mem-title" placeholder="Tiêu đề ảnh..."
                                class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold shadow-inner transition-all">
                        </div>
                    </div>
                    <div class="flex-1 flex flex-col mt-2">
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Kỷ
                            niệm chi tiết</label>
                        <textarea id="mem-desc" placeholder="Chia sẻ cảm xúc về bức ảnh này..."
                            class="w-full flex-1 bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-3 focus:outline-none focus:ring-2 focus:ring-primary/50 font-medium shadow-inner transition-all resize-none min-h-[100px]"></textarea>
                    </div>
                    <button id="mem-upload-btn" onclick="uploadMemory()"
                        class="btn-primary w-full py-4 rounded-2xl font-black shadow-lg shadow-primary/30 hover:shadow-primary/50 flex items-center justify-center gap-2 text-sm uppercase tracking-widest transition-all hover:-translate-y-1 mt-auto">
                        <i class="fas fa-save"></i> Lưu kỷ niệm
                    </button>
                </div>
            </div>
        </div>

        <div class="timeline-container relative">
            <div class="timeline-line"></div>
            <div id="memories-container" class="space-y-10 pl-2">
                <!-- Loading -->
                <div class="text-center py-10 text-gray-400 font-semibold"><i
                        class="fas fa-spinner fa-spin text-2xl text-primary"></i> Đang tải kỷ niệm...</div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        let selectedMemFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (currentUser && currentUser.role === 'Admin') {
                document.getElementById('admin-add-memory').classList.remove('hidden');
            }
            loadMemories();

            const memFileInput = document.getElementById('mem-file');
            if (memFileInput) {
                memFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length > 0) {
                        Array.from(e.target.files).forEach(f => selectedMemFiles.push(f));
                        renderMemPreviews();
                    }
                    e.target.value = '';
                });
            }
        });

        function renderMemPreviews() {
            const previewContainer = document.getElementById('mem-previews');
            if (selectedMemFiles.length === 0) {
                previewContainer.innerHTML = '';
                previewContainer.classList.add('hidden');
                return;
            }

            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');

            selectedMemFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'aspect-square rounded-2xl overflow-hidden shadow-sm border border-gray-100 bg-white relative group animate-fade-in cursor-pointer';
                    div.onclick = () => {
                        selectedMemFiles.splice(index, 1);
                        renderMemPreviews();
                    };
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">
                        <div class="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-trash-alt text-white text-xl shadow-sm"></i>
                        </div>
                    `;
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadMemory() {
            const y = document.getElementById('mem-year').value;
            const t = document.getElementById('mem-title').value;
            const d = document.getElementById('mem-desc').value;
            if (!t || !d || selectedMemFiles.length === 0) return alert('Vui lòng điền đủ thông tin và chọn ảnh');

            const btn = document.getElementById('mem-upload-btn');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;

            const form = new FormData();
            for (let i = 0; i < selectedMemFiles.length; i++) {
                form.append('media', selectedMemFiles[i]);
            }
            const r = await fetch('/api/upload-multiple', { method: 'POST', body: form });
            const dat = await r.json();

            let mediaUrl = dat.urls && dat.urls.length > 0 ? dat.urls[0] : '';
            await apiPost('memories', { year: y, title: t, description: d, mediaUrl, mediaUrls: dat.urls });

            document.getElementById('mem-title').value = '';
            document.getElementById('mem-desc').value = '';
            selectedMemFiles = [];
            renderMemPreviews();
            btn.innerHTML = '<i class="fas fa-save"></i> Lưu kỷ niệm';
            btn.disabled = false;
            loadMemories();
        }

        async function loadMemories() {
            const mems = await apiGet('memories');
            const c = document.getElementById('memories-container');

            // Group by year and sort asc
            const grouped = mems.reduce((acc, m) => {
                acc[m.year] = acc[m.year] || [];
                acc[m.year].push(m);
                return acc;
            }, {});

            let html = '';
            Object.keys(grouped).sort().forEach(year => {
                html += `
                    <div class="relative pt-6">
                        <div class="absolute -left-[54px] top-6 w-12 h-12 bg-white rounded-full border-4 border-primary shadow-lg flex items-center justify-center font-black text-primary text-sm z-10">${year}</div>
                        <h2 class="text-2xl font-black text-primary mb-6 ml-2">${year}</h2>
                        
                        <div class="grid grid-cols-1 gap-8 ml-2">
                            ${grouped[year].map(m => `
                                <div class="glass-card rounded-3xl p-5 shadow-sm transform hover:scale-[1.01] transition-transform duration-300 relative">
                                    ${currentUser && currentUser.role === 'Admin' ? `<button onclick="deleteMemory('${m.id}')" class="absolute top-4 right-4 bg-white/50 hover:bg-red-50 text-red-500 w-8 h-8 rounded-full flex items-center justify-center shadow-sm transition-colors z-20"><i class="fas fa-trash"></i></button>` : ''}
                                    <div class="${m.mediaUrls && m.mediaUrls.length > 0 ? 'flex flex-col gap-6' : 'grid grid-cols-1 md:grid-cols-2 gap-6 items-center'}">
                                        <div class="${m.mediaUrls && m.mediaUrls.length > 0 ? `grid grid-cols-${Math.min(3, m.mediaUrls.length)} gap-3` : 'overflow-hidden rounded-2xl shadow-sm border-4 border-white'}">
                                            ${m.mediaUrls && m.mediaUrls.length > 0 ? m.mediaUrls.map(url => `
                                                <img src="${url}" class="w-full ${m.mediaUrls.length === 1 ? 'max-h-[500px] object-contain bg-gray-50' : 'h-48 md:h-64 object-cover'} rounded-2xl border-4 border-white shadow-sm transform hover:scale-105 transition-transform duration-500">
                                            `).join('') : `
                                                <img src="${m.mediaUrl}" class="w-full h-64 object-cover transform hover:scale-105 transition-transform duration-500">
                                            `}
                                        </div>
                                        <div class="py-2">
                                            <h3 class="text-2xl font-bold text-dark mb-3">${m.title}</h3>
                                            <p class="text-gray-600 font-medium leading-relaxed italic border-l-4 border-secondary pl-4 py-2 bg-orange-50/50 rounded-r-xl">${m.description}</p>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            c.innerHTML = html || '<p class="text-gray-500 font-bold ml-2">Chưa có kỷ niệm nào.</p>';
        }

        async function deleteMemory(id) {
            if (confirm("Chắc chắn xóa ảnh/kỷ niệm này?")) {
                await fetch(`/api/memories/${id}`, { method: 'DELETE' });
                loadMemories();
            }
        }
    </script>
</body>

</html>
