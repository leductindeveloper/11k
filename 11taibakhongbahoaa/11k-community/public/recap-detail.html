<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Portal | Chi Tiết Sự Kiện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', olive: '#98a84c', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-bg font-sans text-gray-800 antialiased">
    <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Tài liệu</a>
                    <a href="honors.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng vàng</a>
                    <a href="recap.html" class="text-primary font-bold text-sm relative after:absolute after:bottom-[-20px] after:left-0 after:w-full after:h-0.5 after:bg-primary">Sự kiện</a>
                    <a href="memories.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Kỷ niệm</a>
                    <a href="members.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10" id="detail-container">
        <!-- Loading UI -->
        <div class="flex justify-center py-20">
            <i class="fas fa-spinner fa-spin text-4xl text-primary"></i>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const container = document.getElementById('detail-container');
            
            if (!id) {
                container.innerHTML = '<div class="text-center py-20 text-gray-500 font-bold">Không tìm thấy mã sự kiện. <a href="recap.html" class="text-primary underline mt-4 block">Quay lại trang Sự Kiện</a></div>';
                return;
            }

            try {
                const recaps = await apiGet('recaps');
                const recap = recaps.find(r => r.id === id);

                if (!recap) {
                    container.innerHTML = '<div class="text-center py-20 text-gray-500 font-bold">Sự kiện này không tồn tại hoặc đã bị xóa. <a href="recap.html" class="text-primary underline mt-4 block">Quay lại trang Sự Kiện</a></div>';
                    return;
                }

                const images = recap.mediaUrls && recap.mediaUrls.length > 0 ? recap.mediaUrls : [recap.mediaUrl];
                const imagesHtml = images.map(url => `
                    <div class="glass-card rounded-3xl overflow-hidden shadow-sm bg-gray-50 flex justify-center items-center relative group p-2 mb-6">
                        <img src="${url}" class="w-full h-auto max-h-[700px] object-contain rounded-2xl shadow-md">
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="flex items-center justify-between mb-8">
                        <a href="recap.html" class="inline-flex items-center text-gray-500 hover:text-primary font-bold text-sm transition-colors bg-white px-5 py-2.5 rounded-full shadow-sm hover:shadow-md">
                            <i class="fas fa-arrow-left mr-2"></i> Quay lại Sự Kiện
                        </a>
                    </div>
                    <div class="flex flex-col lg:flex-row gap-10 lg:gap-12">
                        <!-- Left Column (Image Gallery) -->
                        <div class="w-full lg:w-1/2">
                            ${imagesHtml}
                        </div>
                        
                        <!-- Right Column (Content) -->
                        <div class="w-full lg:w-1/2">
                            <div class="sticky top-24 glass-card rounded-3xl p-8 md:p-12 shadow-lg bg-white border-t-4 border-primary">
                                <p class="text-xs font-black uppercase text-primary mb-4 tracking-widest"><i class="fas fa-calendar-alt mr-2"></i> ${new Date(recap.createdAt).toLocaleDateString('vi-VN', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                                <h1 class="text-3xl lg:text-5xl font-black text-dark leading-tight mb-8">${recap.title}</h1>
                                <div class="text-[15px] sm:text-lg text-gray-700 font-medium leading-relaxed whitespace-pre-wrap border-l-4 border-gray-200 pl-6">${recap.description}</div>
                            </div>
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML = '<div class="text-center py-20 text-red-500 font-bold">Lỗi khi tải dữ liệu sự kiện.</div>';
            }
        });
    </script>
</body>
</html>
