<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11K Portal | Sự Kiện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: '#ff6c00', secondary: '#ed8720', dark: '#35575a', olive: '#98a84c', bg: '#fdfaf8' }, fontFamily: { sans: ['Inter', 'Nunito', 'sans-serif'] } } } }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-bg font-sans text-gray-800 antialiased">
        <nav class="bg-white/90 backdrop-blur-xl border-b border-gray-100 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16 w-full">
                <!-- Logo -->
                <a href="index.html" class="flex items-center gap-3 group">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary text-white rounded-xl flex items-center justify-center font-black text-xl shadow-lg ring-2 ring-orange-100 transform group-hover:scale-105 transition-transform">
                        11K</div>
                    <div class="hidden sm:flex flex-col">
                        <span class="font-extrabold text-xl text-dark tracking-tight leading-none uppercase">Cổng Thông Tin 11K</span>
                        <span class="text-[10px] font-bold text-gray-400 tracking-widest uppercase mt-0.5">Hệ thống Quản lý Nội bộ</span>
                    </div>
                </a>

                <!-- Desktop Nav -->
                <div class="hidden lg:flex space-x-6 items-center">
                    <a href="index.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng tin</a>
                    <a href="documents.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Tài liệu</a>
                    <a href="honors.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Bảng vàng</a>
                    <a href="recap.html" class="text-primary font-bold text-sm relative after:absolute after:bottom-[-20px] after:left-0 after:w-full after:h-0.5 after:bg-primary">Sự kiện</a>
                    <a href="memories.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Kỷ niệm</a>
                    <a href="members.html" class="text-gray-500 hover:text-primary font-semibold text-sm transition-colors">Thành viên</a>
                    <div id="auth-section"></div> <!-- Dynamic Auth (Hidden for guests) -->
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-black text-dark tracking-tight mb-3">Recaps Hoạt Động</h1>
            <p class="text-lg text-gray-500 font-medium">Nhìn lại những sự kiện nổi bật của Cổng Thông Tin 11K</p>
        </div>

        <div class="admin-only hidden mb-12 p-8 glass-card rounded-3xl shadow-lg border-t-4 border-primary bg-white">
            <h3 class="font-black text-2xl mb-8 text-dark tracking-tight"><i class="fas fa-magic text-primary mr-2"></i> Tạo Ghi Chú Sự Kiện Mới</h3>
            
            <div class="flex flex-col lg:flex-row gap-8">
                <!-- Left Column: Image Upload & Preview -->
                <div class="w-full lg:w-1/2 flex flex-col gap-4">
                    <label id="drop-zone" for="recap-file" class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-primary/40 rounded-3xl cursor-pointer bg-orange-50/50 hover:bg-orange-50 transition-colors group relative overflow-hidden">
                        <div class="flex flex-col items-center justify-center z-10">
                            <i class="fas fa-cloud-upload-alt text-4xl text-primary/50 group-hover:text-primary transition-colors mb-3"></i>
                            <p class="mb-1 text-sm text-gray-700 font-bold"><span class="text-primary font-black">Nhấn để chọn</span> hoặc kéo thả từng ảnh</p>
                            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Sẽ lưu dồn nhiều ảnh</p>
                        </div>
                        <input id="recap-file" type="file" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-50" multiple accept="image/*" />
                    </label>
                    <div id="recap-previews" class="grid grid-cols-3 sm:grid-cols-4 gap-3 hidden"></div>
                </div>

                <!-- Right Column: Content Input -->
                <div class="w-full lg:w-1/2 flex flex-col gap-5">
                    <div>
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Tiêu đề Sự Kiện</label>
                        <input type="text" id="recap-title" placeholder="Nhập tiêu đề thu hút..." class="w-full bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-primary/50 font-bold shadow-inner transition-all">
                    </div>
                    <div class="flex-1 flex flex-col">
                        <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Nội dung chi tiết</label>
                        <textarea id="recap-desc" placeholder="Kể lại câu chuyện của sự kiện này..." class="w-full flex-1 bg-gray-50 border border-transparent focus:bg-white text-gray-800 rounded-2xl px-5 py-4 focus:outline-none focus:ring-2 focus:ring-primary/50 font-medium shadow-inner transition-all resize-none min-h-[120px]"></textarea>
                    </div>
                    <button id="upload-btn" onclick="uploadRecap()" class="btn-primary w-full py-4 rounded-2xl font-black shadow-lg shadow-primary/30 hover:shadow-primary/50 flex items-center justify-center gap-2 text-sm uppercase tracking-widest transition-all hover:-translate-y-1 mt-auto">
                        <i class="fas fa-paper-plane"></i> Xuất bản Recap
                    </button>
                </div>
            </div>
        </div>

        <div id="recaps-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>



    <script src="js/app.js"></script>
    <script>
        let selectedFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('recaps-container');
            container.innerHTML = getSkeletonHTML() + getSkeletonHTML() + getSkeletonHTML();
            setTimeout(loadRecaps, 500);

            const fileInput = document.getElementById('recap-file');
            if (fileInput) {
                fileInput.addEventListener('change', (e) => {
                    if(e.target.files.length > 0) {
                        Array.from(e.target.files).forEach(f => selectedFiles.push(f));
                        renderPreviews();
                    }
                    e.target.value = ''; // Reset so same file can trigger change again
                });
            }
        });

        function renderPreviews() {
            const previewContainer = document.getElementById('recap-previews');
            if (selectedFiles.length === 0) {
                previewContainer.innerHTML = '';
                previewContainer.classList.add('hidden');
                return;
            }
            
            previewContainer.innerHTML = '';
            previewContainer.classList.remove('hidden');
            
            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const div = document.createElement('div');
                    div.className = 'aspect-square rounded-2xl overflow-hidden shadow-sm border border-gray-100 bg-white relative group animate-fade-in cursor-pointer';
                    div.onclick = () => {
                        selectedFiles.splice(index, 1);
                        renderPreviews();
                    };
                    div.innerHTML = `
                        <img src="${e.target.result}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-300">
                        <div class="absolute inset-0 bg-red-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i class="fas fa-trash-alt text-white text-xl shadow-sm"></i>
                        </div>
                    `;
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadRecap() {
            const title = document.getElementById('recap-title').value;
            const desc = document.getElementById('recap-desc').value;
            if (!title || !desc || selectedFiles.length === 0) return showToast('Vui lòng điền đủ thông tin và chọn ảnh', 'error');

            showToast('Đang xử lý tải lên...');
            const formData = new FormData();
            for(let i=0; i<selectedFiles.length; i++){
                formData.append('media', selectedFiles[i]);
            }
            const res = await fetch('/api/upload-multiple', { method: 'POST', body: formData });
            const dat = await res.json();
            
            const mediaUrl = dat.urls && dat.urls.length > 0 ? dat.urls[0] : '';

            await apiPost('recaps', { title, description: desc, mediaUrl: mediaUrl, mediaUrls: dat.urls });
            
            showToast('Sự kiện đã lên sóng!');
            document.getElementById('recap-title').value = '';
            document.getElementById('recap-desc').value = '';
            selectedFiles = [];
            renderPreviews();
            loadRecaps();
        }

        async function loadRecaps() {
            const recaps = await apiGet('recaps');
            const c = document.getElementById('recaps-container');
            if (recaps.length === 0) return c.innerHTML = '<div class="col-span-full text-center text-gray-500 py-10 font-bold glass-card rounded-2xl">Chưa có bản cập nhật recap nào.</div>';

            c.innerHTML = recaps.map(r => `
                <div class="glass-card rounded-3xl overflow-hidden shadow-sm flex flex-col hover:-translate-y-2 transition-transform duration-300 relative group cursor-pointer" onclick="window.location.href='recap-detail.html?id=${r.id}'">
                    ${currentUser && currentUser.role === 'Admin' ? `<button onclick="event.stopPropagation(); deleteRecap('${r.id}')" class="absolute top-4 right-4 bg-white/70 hover:bg-red-50 text-red-500 rounded-full w-8 h-8 flex justify-center items-center backdrop-blur-sm z-20"><i class="fas fa-trash"></i></button>` : ''}
                    <img src="${r.mediaUrl}" class="w-full h-48 object-cover border-b border-gray-100 group-hover:scale-105 transition-transform duration-500">
                    <div class="p-5 flex-1 flex flex-col z-10 bg-white">
                        <p class="text-[10px] font-black uppercase text-primary mb-2 tracking-widest">${timeAgo(r.createdAt)}</p>
                        <h3 class="font-black text-dark text-lg leading-tight mb-2 line-clamp-2">${r.title}</h3>
                        <p class="text-sm text-gray-600 font-medium leading-relaxed flex-1 line-clamp-3">${r.description}</p>
                    </div>
                </div>
            `).join('');
        }

        async function deleteRecap(id) {
            if (confirm("Chắc chắn xóa?")) {
                await fetch(`/api/recaps/${id}`, { method: 'DELETE' });
                showToast("Đã xóa");
                loadRecaps();
            }
        }
    </script>
</body>
</html>
